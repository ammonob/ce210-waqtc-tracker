<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CE 210 Progress Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 md:p-12 font-sans text-gray-800">

  <div class="max-w-6xl mx-auto">
    <div class="mb-10 text-center">
      <h1 class="text-3xl font-bold text-blue-700 flex justify-center items-center gap-3">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
        CE 210 WAQTC Progress Tracker
      </h1>
      <p class="text-gray-500 mt-2">Live Firebase Cloud Sync</p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-8 max-w-4xl mx-auto">
      <h3 class="text-lg font-bold mb-4 text-gray-700 border-b pb-2">Admin Dashboard</h3>
      
      <div class="grid md:grid-cols-2 gap-6">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-gray-600">Add New Student</label>
          <div class="flex gap-2">
            <input type="text" id="newStudentName" placeholder="Student Name" class="border p-2 rounded-lg flex-grow focus:outline-none focus:ring-2 focus:ring-blue-400">
            <button id="addStudentBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">Add</button>
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-gray-600">Add New Test (Applies to all)</label>
          <div class="flex gap-2">
            <input type="text" id="newTestName" placeholder="e.g. T99 PROCTOR" class="border p-2 rounded-lg flex-grow focus:outline-none focus:ring-2 focus:ring-green-400">
            <button id="addTestBtn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">Add</button>
          </div>
        </div>
      </div>
    </div>

    <div id="loading" class="text-center py-10 text-gray-500 animate-pulse">
      Connecting to database...
    </div>

    <div id="dashboard" class="grid gap-6 md:grid-cols-2 xl:grid-cols-3 invisible"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Your specific Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyC0tR3hpuQpTHTEObm21azoQKq9Qbm4LP0",
      authDomain: "ce-210-waqtc-progress-tracker.firebaseapp.com",
      projectId: "ce-210-waqtc-progress-tracker",
      storageBucket: "ce-210-waqtc-progress-tracker.firebasestorage.app",
      messagingSenderId: "951204967927",
      appId: "1:951204967927:web:721cb7e4119bb0042e6af2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let activeTests = new Set(); 

    async function initDashboard() {
      try {
        const querySnapshot = await getDocs(collection(db, "students"));
        
        document.getElementById('loading').style.display = 'none';
        const dashboard = document.getElementById('dashboard');
        dashboard.innerHTML = ''; 
        dashboard.classList.remove('invisible');
        activeTests.clear();

        const students = [];

        querySnapshot.forEach((doc) => {
          const studentData = doc.data();
          students.push({ id: doc.id, data: studentData });
          
          Object.keys(studentData).forEach(key => {
            if (key !== "name") activeTests.add(key);
          });
        });

        students.sort((a, b) => a.data.name.localeCompare(b.data.name));

        students.forEach(student => {
          dashboard.appendChild(createStudentCard(student.id, student.data));
        });

      } catch (error) {
        document.getElementById('loading').innerText = "Failed to load database. Check console.";
        console.error("Firebase Error: ", error);
      }
    }

    function createStudentCard(studentId, data) {
      const card = document.createElement('div');
      card.className = "bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden";
      
      let togglesHTML = '';
      
      const sortedTests = Object.keys(data).filter(k => k !== "name").sort();

      sortedTests.forEach(key => {
        const isChecked = data[key] ? "checked" : "";
        const formattedName = key.replace(/_/g, ' '); 
        
        togglesHTML += `
          <div class="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
            <span class="text-xs font-semibold text-gray-600">${formattedName}</span>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" class="sr-only peer" ${isChecked} data-id="${studentId}" data-field="${key}">
              <div class="w-9 h-5 bg-gray-200 rounded-full peer peer-focus:ring-2 peer-focus:ring-blue-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
            </label>
          </div>
        `;
      });

      card.innerHTML = `
        <div class="bg-slate-100 px-4 py-3 border-b border-gray-200">
          <h2 class="text-lg font-bold text-gray-800 truncate">${data.name}</h2>
        </div>
        <div class="p-4 grid grid-cols-2 gap-x-4">${togglesHTML}</div>
      `;

      const checkboxes = card.querySelectorAll('input[type="checkbox"]');
      checkboxes.forEach(box => {
        box.addEventListener('change', async (e) => {
          const docId = e.target.getAttribute('data-id');
          const fieldName = e.target.getAttribute('data-field');
          const newValue = e.target.checked;
          
          try {
            await updateDoc(doc(db, "students", docId), { [fieldName]: newValue });
          } catch (error) {
            alert("Failed to save progress.");
            e.target.checked = !newValue; 
          }
        });
      });

      return card;
    }

    document.getElementById('addStudentBtn').addEventListener('click', async () => {
      const input = document.getElementById('newStudentName');
      const name = input.value.trim();
      if (!name) return alert("Please enter a name.");

      const btn = document.getElementById('addStudentBtn');
      btn.innerText = "Adding...";
      
      try {
        let newStudentData = { name: name };
        activeTests.forEach(test => newStudentData[test] = false);

        await addDoc(collection(db, "students"), newStudentData);
        input.value = '';
        initDashboard(); 
      } catch (error) {
        alert("Failed to add student.");
      }
      btn.innerText = "Add";
    });

    document.getElementById('addTestBtn').addEventListener('click', async () => {
      const input = document.getElementById('newTestName');
      const rawName = input.value.trim();
      if (!rawName) return alert("Please enter a test name.");

      const safeTestName = rawName.replace(/[\/ ]/g, '_').toUpperCase();

      const btn = document.getElementById('addTestBtn');
      btn.innerText = "Adding...";

      try {
        const snapshot = await getDocs(collection(db, "students"));
        const updatePromises = [];
        
        snapshot.forEach((document) => {
          const studentRef = doc(db, "students", document.id);
          updatePromises.push(updateDoc(studentRef, { [safeTestName]: false }));
        });

        await Promise.all(updatePromises);
        input.value = '';
        initDashboard(); 
      } catch (error) {
        alert("Failed to add test.");
        console.error(error);
      }
      btn.innerText = "Add";
    });

    initDashboard();
  </script>
</body>
</html>
