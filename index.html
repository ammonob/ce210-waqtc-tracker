<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WAQTC Matrix</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-blue-900">WAQTC Certification Matrix</h1>
      <button id="adminLoginBtn" class="bg-gray-800 text-white px-4 py-2 rounded">Admin Access</button>
    </div>

    <div id="adminPanel" class="hidden bg-red-50 p-6 rounded-lg mb-6 border border-red-200">
      <h2 class="text-lg font-bold text-red-800 mb-4">Admin Controls</h2>
      <div class="flex gap-4">
        <input type="text" id="newStudentName" placeholder="Student Name" class="border p-2 rounded">
        <button id="addStudentBtn" class="bg-blue-600 text-white px-4 py-2 rounded">Add Student</button>
        <input type="text" id="newTestName" placeholder="New Test Name" class="border p-2 rounded">
        <button id="addTestBtn" class="bg-green-600 text-white px-4 py-2 rounded">Add Test</button>
      </div>
    </div>

    <div id="dashboard" class="bg-white shadow rounded-lg overflow-x-auto">
      <p class="p-10 text-center text-gray-500">Loading matrix...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC0tR3hpuQpTHTEObm21azoQKq9Qbm4LP0",
      authDomain: "ce-210-waqtc-progress-tracker.firebaseapp.com",
      projectId: "ce-210-waqtc-progress-tracker",
      storageBucket: "ce-210-waqtc-progress-tracker.firebasestorage.app",
      messagingSenderId: "951204967927",
      appId: "1:951204967927:web:721cb7e4119bb0042e6af2"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    let isAdmin = false;

    document.getElementById('adminLoginBtn').onclick = () => {
      const pass = prompt("Enter Password:");
      if (pass === "WAQTC2026") {
        isAdmin = true;
        document.getElementById('adminPanel').classList.remove('hidden');
        renderTable();
      } else { alert("Wrong password"); }
    };

    async function renderTable() {
      const dashboard = document.getElementById('dashboard');
      try {
        const snap = await getDocs(collection(db, "students"));
        let students = [], tests = new Set();
        snap.forEach(d => { students.push({id: d.id, ...d.data()}); Object.keys(d.data()).forEach(k => k !== 'name' && tests.add(k)); });
        
        let sortedTests = Array.from(tests).sort();
        let html = `<table class="w-full text-sm"><thead><tr class="bg-blue-900 text-white">
          <th class="p-3 text-left">Student</th>` + 
          sortedTests.map(t => `<th class="p-2 border-l border-blue-800">${t.replace(/_/g,' ')} ${isAdmin ? `<button onclick="deleteTest('${t}')" class="text-red-300">×</button>`:''}</th>`).join('') +
          `</tr></thead><tbody>`;

        students.sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
          html += `<tr class="border-b">
            <td class="p-3 font-medium">${isAdmin ? `<button onclick="deleteStudent('${s.id}')" class="text-red-500 mr-2">×</button>`:''}${s.name}</td>` +
            sortedTests.map(t => `
              <td class="p-2 text-center border-l">
                <label class="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" class="sr-only peer" ${s[t] ? 'checked' : ''} onchange="updateToggle('${s.id}', '${t}', this.checked)">
                  <div class="w-9 h-5 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                </label>
              </td>`).join('') +
            `</tr>`;
        });
        dashboard.innerHTML = html + `</tbody></table>`;
      } catch(e) { console.error(e); dashboard.innerHTML = "<p class='p-10 text-red-500'>Error loading data.</p>"; }
    }

    window.updateToggle = async (id, field, val) => await updateDoc(doc(db, 'students', id), {[field]: val});
    window.deleteStudent = async (id) => { await deleteDoc(doc(db, 'students', id)); renderTable(); };
    window.deleteTest = async (test) => {
      const snaps = await getDocs(collection(db, 'students'));
      for (const d of snaps.docs) { let dta = d.data(); delete dta[test]; await updateDoc(d.ref, dta); }
      renderTable();
    };

    renderTable();
  </script>
</body>
</html>
