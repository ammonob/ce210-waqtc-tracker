<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WAQTC Matrix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .bg-grid-pattern {
      background-color: #0c366e;
      background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
      background-size: 20px 20px;
    }
  </style>
</head>
<body class="bg-gray-50 font-sans">

  <header class="bg-grid-pattern text-white pt-10 pb-20 px-8">
    <div class="max-w-7xl mx-auto flex justify-between items-start">
      <div class="flex items-center gap-5">
        <div class="bg-[#2c3e50] p-3 rounded-lg shadow-lg border border-gray-600">
           <span class="text-2xl">🏗️</span>
        </div>
        <div>
          <h1 class="text-3xl font-bold tracking-tight">CE 210 Materials Lab – WAQTC Progress Tracker</h1>
          <p class="text-gray-300 text-sm mt-1 uppercase tracking-wider">Western Alliance for Quality Transportation Construction · Certification Progress</p>
        </div>
      </div>
      <button id="adminLoginBtn" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded text-xs font-bold uppercase tracking-widest transition-all border border-white/20">Admin Access</button>
    </div>
  </header>

  <main class="px-6 -mt-12">
    <section class="max-w-7xl mx-auto bg-white rounded-xl shadow-[0_2px_15px_-3px_rgba(0,0,0,0.07),0_10px_20px_-2px_rgba(0,0,0,0.04)] border border-gray-100 p-8 mb-10">
      <h2 class="text-xs text-gray-500 uppercase tracking-widest mb-6">Class Leaderboard</h2>
      <div id="leaderboardContent" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    </section>

    <div id="adminPanel" class="hidden max-w-7xl mx-auto bg-red-50 p-6 rounded-lg mb-10 border border-red-200">
      <h2 class="text-lg font-bold text-red-800 mb-4 uppercase text-xs tracking-widest">Admin Controls</h2>
      <div class="grid md:grid-cols-2 gap-4">
        <div class="flex gap-2">
          <input type="text" id="newStudentName" placeholder="Student Name" class="border p-2 rounded w-full">
          <button id="addStudentBtn" class="bg-blue-600 text-white px-6 py-2 rounded font-bold text-sm uppercase tracking-wide">Add Student</button>
        </div>
        <div class="flex gap-2">
          <input type="text" id="newTestName" placeholder="New Test Name" class="border p-2 rounded w-full">
          <button id="addTestBtn" class="bg-green-600 text-white px-6 py-2 rounded font-bold text-sm uppercase tracking-wide">Add Test</button>
        </div>
      </div>
    </div>

    <div class="max-w-7xl mx-auto">
      <h2 class="text-xs text-gray-500 uppercase tracking-widest mb-4">Certification Checklist</h2>
      
      <div id="dashboard" class="bg-white shadow-sm rounded-lg overflow-x-auto border border-gray-200 mb-6">
        <p class="p-10 text-center text-gray-400 italic">Connecting to secure database...</p>
      </div>
      <div class="text-center text-gray-500 text-sm mb-12">
        WAQTC Resources: <a href="https://www.waqtc.org/technician-resources/" target="_blank" class="text-blue-600 hover:underline">waqtc.org/technician-resources</a>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc, deleteField } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC0tR3hpuQpTHTEObm21azoQKq9Qbm4LP0",
      authDomain: "ce-210-waqtc-progress-tracker.firebaseapp.com",
      projectId: "ce-210-waqtc-progress-tracker",
      storageBucket: "ce-210-waqtc-progress-tracker.firebasestorage.app",
      messagingSenderId: "951204967927",
      appId: "1:951204967927:web:721cb7e4119bb0042e6af2"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    let isAdmin = false;

    document.getElementById('adminLoginBtn').onclick = () => {
      const pass = prompt("Enter Administrator Password:");
      if (pass === "WAQTC2026") {
        isAdmin = true;
        document.getElementById('adminPanel').classList.remove('hidden');
        renderTable();
      } else { alert("Access Denied."); }
    };

    async function renderTable() {
      const dashboard = document.getElementById('dashboard');
      const lbContent = document.getElementById('leaderboardContent');
      try {
        const snap = await getDocs(collection(db, "students"));
        let students = [], tests = new Set();
        
        snap.forEach(d => { 
          let data = d.data();
          let count = Object.values(data).filter(v => v === true).length;
          students.push({id: d.id, count, ...data}); 
          Object.keys(data).forEach(k => k !== 'name' && tests.add(k)); 
        });

        const totalPossible = tests.size;
        let sortedLeaders = students.sort((a,b) => b.count - a.count || a.name.localeCompare(b.name));

        lbContent.innerHTML = sortedLeaders.slice(0, 10).map((s, i) => {
          let pct = totalPossible > 0 ? Math.round((s.count/totalPossible)*100) : 0;
          let rank = i + 1;
          let tint = rank === 1 ? 'bg-[#fffbeb] border-yellow-200' : rank === 2 ? 'bg-[#f0f7ff] border-blue-200' : rank === 3 ? 'bg-[#fff7ed] border-orange-200' : 'bg-white border-gray-100';
          let icon = rank === 1 ? '🏆' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `<span class="text-gray-300 text-xs">#${rank}</span>`;
          
          return `
            <div class="${tint} p-5 rounded-lg border shadow-sm transition-transform hover:scale-[1.02]">
              <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-3">
                  <span class="text-xl">${icon}</span>
                  <span class="text-gray-800 text-sm tracking-tight">${s.name}</span>
                </div>
                <span class="text-blue-600 text-sm">${pct}%</span>
              </div>
              <div class="w-full bg-gray-100 rounded-full h-2.5">
                <div class="bg-gradient-to-r from-blue-600 to-green-400 h-2.5 rounded-full shadow-[0_0_8px_rgba(59,130,246,0.3)]" style="width: ${pct}%"></div>
              </div>
            </div>`;
        }).join('');

        let sortedTests = Array.from(tests).sort();
        // Set header to not bold (font-normal)
        let html = `<table class="w-full text-sm border-collapse border-0"><thead><tr class="bg-[#1a3a5f] text-white font-normal">
          <th class="p-4 text-left whitespace-nowrap sticky left-0 z-20 bg-[#1a3a5f] border-r border-white/10 shadow-[4px_0_10px_rgba(0,0,0,0.15)] text-[10px] tracking-widest font-normal">Student</th>` + 
          sortedTests.map(t => `<th class="p-4 whitespace-nowrap text-[10px] tracking-widest font-normal">
            <a href="https://www.waqtc.org/technician-resources/" target="_blank" class="hover:underline text-white">${t.replace(/_/g,' ')}</a> 
            ${isAdmin ? `<button onclick="window.deleteTest('${t}')" class="text-red-400 ml-2 hover:text-white">×</button>`:''}</th>`).join('') +
          `</tr></thead><tbody>`;

        students.sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
          html += `<tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
            <td class="p-4 text-gray-700 sticky left-0 z-10 bg-white border-r border-gray-100 shadow-[4px_0_10px_rgba(0,0,0,0.03)] whitespace-nowrap">${isAdmin ? `<button onclick="window.deleteStudent('${s.id}')" class="text-red-500 mr-3">×</button>`:''}${s.name}</td>` +
            sortedTests.map(t => `<td class="p-4 text-center">
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" class="sr-only peer toggle-glow" ${s[t] ? 'checked' : ''} onchange="window.updateToggle('${s.id}', '${t}', this.checked)">
                <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-checked:bg-green-500 peer-checked:shadow-[0_0_10px_rgba(34,197,94,0.7)] after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full toggle-bg"></div>
              </label>
            </td>`).join('') + `</tr>`;
        });
        dashboard.innerHTML = html + `</tbody></table>`;
      } catch(e) { console.error(e); }
    }

    window.updateToggle = async (id, field, val) => { await updateDoc(doc(db, 'students', id), {[field]: val}); renderTable(); };
    window.deleteStudent = async (id) => { if(confirm('Delete student?')) await deleteDoc(doc(db, 'students', id)); renderTable(); };
    window.deleteTest = async (test) => {
      if(!confirm('This will delete the entire column for ALL students. Proceed?')) return;
      const snaps = await getDocs(collection(db, "students"));
      const updates = snaps.docs.map(d => updateDoc(d.ref, { [test]: deleteField() }));
      await Promise.all(updates);
      renderTable();
    };

    document.getElementById('addStudentBtn').onclick = async () => {
      const name = document.getElementById('newStudentName').value.trim();
      if(!name) return;
      let data = { name };
      document.querySelectorAll('th').forEach(th => {
        if(th.innerText.includes('×')) data[th.innerText.replace(' ×', '').replace(/ /g, '_')] = false;
      });
      await addDoc(collection(db, "students"), data);
      document.getElementById('newStudentName').value = '';
      renderTable();
    };

    document.getElementById('addTestBtn').onclick = async () => {
      const name = document.getElementById('newTestName').value.trim();
      if(!name) return;
      const field = name.replace(/[\/ ]/g, '_').toUpperCase();
      const snaps = await getDocs(collection(db, "students"));
      const updates = snaps.docs.map(d => updateDoc(d.ref, {[field]: false}));
      await Promise.all(updates);
      document.getElementById('newTestName').value = '';
      renderTable();
    };

    renderTable();
  </script>
</body>
</html>
