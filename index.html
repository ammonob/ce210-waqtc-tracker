<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CE 210 Progress Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 font-sans text-gray-800">

  <div class="max-w-7xl mx-auto">
    <div class="mb-8 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-blue-800">WAQTC Certification Matrix</h1>
      <button id="adminLoginBtn" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm">Admin Access</button>
    </div>

    <div id="adminPanel" class="hidden bg-red-50 p-6 rounded-xl shadow-sm border border-red-200 mb-8 max-w-4xl mx-auto">
      <h3 class="text-lg font-bold mb-4 text-red-700">Admin Controls</h3>
      <div class="grid md:grid-cols-2 gap-6">
        <input type="text" id="newStudentName" placeholder="Student Name" class="border p-2 rounded">
        <button id="addStudentBtn" class="bg-blue-600 text-white px-4 py-2 rounded">Add Student</button>
        <input type="text" id="newTestName" placeholder="e.g. T99 PROCTOR" class="border p-2 rounded">
        <button id="addTestBtn" class="bg-green-600 text-white px-4 py-2 rounded">Add New Test</button>
      </div>
    </div>

    <div id="dashboard" class="overflow-x-auto bg-white rounded-xl shadow-sm border border-gray-300">
      </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- PASTE YOUR KEYS HERE ---
    const firebaseConfig = { /* ...YOUR KEYS... */ };
    
    const db = getFirestore(initializeApp(firebaseConfig));
    let isAdmin = false;

    // Password Protection
    document.getElementById('adminLoginBtn').onclick = () => {
      const pass = prompt("Enter Admin Password:");
      if (pass === "WAQTC2026") {
        isAdmin = true;
        document.getElementById('adminPanel').classList.remove('hidden');
        initDashboard();
      } else {
        alert("Incorrect password");
      }
    };

    async function initDashboard() {
      const querySnapshot = await getDocs(collection(db, "students"));
      const dashboard = document.getElementById('dashboard');
      let students = [];
      let tests = new Set();

      querySnapshot.forEach(d => {
        students.push({ id: d.id, ...d.data() });
        Object.keys(d.data()).forEach(k => k !== 'name' && tests.add(k));
      });

      const sortedTests = Array.from(tests).sort();
      
      let html = `<table class="w-full text-sm"><thead><tr class="bg-blue-900 text-white">
        <th class="p-4 text-left">Student</th>` + 
        sortedTests.map(t => `<th class="p-2">${t.replace(/_/g, ' ')} ${isAdmin ? `<button onclick="deleteTest('${t}')" class="text-red-300 ml-1">x</button>` : ''}</th>`).join('') +
        `</tr></thead><tbody>`;

      students.forEach(s => {
        html += `<tr class="border-b">
          <td class="p-4 font-bold">${isAdmin ? `<button onclick="deleteStudent('${s.id}')" class="text-red-500 mr-2">x</button>` : ''}${s.name}</td>` +
          sortedTests.map(t => `<td class="p-2 text-center"><input type="checkbox" ${s[t] ? 'checked' : ''} onchange="updateToggle('${s.id}', '${t}', this.checked)"></td>`).join('') +
          `</tr>`;
      });

      dashboard.innerHTML = html + `</tbody></table>`;
    }

    // Helper functions for the buttons
    window.deleteStudent = async (id) => { if(confirm('Delete student?')) await deleteDoc(doc(db, 'students', id)); initDashboard(); };
    window.deleteTest = async (test) => { 
        if(!confirm('Delete this test for everyone?')) return;
        const snaps = await getDocs(collection(db, 'students'));
        snaps.forEach(async (d) => {
            const data = d.data();
            delete data[test];
            await updateDoc(doc(db, 'students', d.id), data);
        });
        initDashboard();
    };
    window.updateToggle = async (id, field, val) => await updateDoc(doc(db, 'students', id), {[field]: val});

    initDashboard();
  </script>
</body>
</html>
