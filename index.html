<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WAQTC Matrix</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-900">WAQTC Certification Matrix</h1>
      <button id="adminLoginBtn" class="bg-gray-200 text-gray-700 px-4 py-2 rounded text-sm font-semibold">Admin Access</button>
    </div>

    <div id="leaderboard" class="mb-8">
      <h2 class="text-lg font-bold text-gray-800 mb-4">Class Leaderboard</h2>
      <div id="leaderboardContent" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>

    <div id="adminPanel" class="hidden bg-red-50 p-6 rounded-lg mb-8 border border-red-200">
      <h2 class="text-lg font-bold text-red-800 mb-4">Admin Controls</h2>
      <div class="grid md:grid-cols-2 gap-4">
        <div class="flex gap-2">
          <input type="text" id="newStudentName" placeholder="Student Name" class="border p-2 rounded w-full">
          <button id="addStudentBtn" class="bg-blue-600 text-white px-4 py-2 rounded whitespace-nowrap">Add Student</button>
        </div>
        <div class="flex gap-2">
          <input type="text" id="newTestName" placeholder="New Test Name" class="border p-2 rounded w-full">
          <button id="addTestBtn" class="bg-green-600 text-white px-4 py-2 rounded whitespace-nowrap">Add Test</button>
        </div>
      </div>
    </div>

    <div id="dashboard" class="bg-white shadow rounded-lg overflow-x-auto border border-gray-200">
      <p class="p-10 text-center text-gray-500">Loading matrix...</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, addDoc, deleteDoc, deleteField } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC0tR3hpuQpTHTEObm21azoQKq9Qbm4LP0",
      authDomain: "ce-210-waqtc-progress-tracker.firebaseapp.com",
      projectId: "ce-210-waqtc-progress-tracker",
      storageBucket: "ce-210-waqtc-progress-tracker.firebasestorage.app",
      messagingSenderId: "951204967927",
      appId: "1:951204967927:web:721cb7e4119bb0042e6af2"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    let isAdmin = false;

    document.getElementById('adminLoginBtn').onclick = () => {
      const pass = prompt("Enter Password:");
      if (pass === "WAQTC2026") {
        isAdmin = true;
        document.getElementById('adminPanel').classList.remove('hidden');
        renderTable();
      } else { alert("Wrong password"); }
    };

    async function renderTable() {
      const dashboard = document.getElementById('dashboard');
      const lbContent = document.getElementById('leaderboardContent');
      try {
        const snap = await getDocs(collection(db, "students"));
        let students = [], tests = new Set();
        
        snap.forEach(d => { 
          let data = d.data();
          let count = Object.values(data).filter(v => v === true).length;
          students.push({id: d.id, count, ...data}); 
          Object.keys(data).forEach(k => k !== 'name' && tests.add(k)); 
        });

        const totalPossible = tests.size;
        let sortedLeaders = students.sort((a,b) => b.count - a.count || a.name.localeCompare(b.name));

        lbContent.innerHTML = sortedLeaders.slice(0, 10).map((s, i) => {
          let pct = totalPossible > 0 ? Math.round((s.count/totalPossible)*100) : 0;
          let rank = i + 1;
          let tint = rank === 1 ? 'bg-yellow-50' : rank === 2 ? 'bg-blue-50' : rank === 3 ? 'bg-orange-50' : 'bg-white';
          let icon = rank === 1 ? '🏆' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
          
          return `
            <div class="${tint} p-4 rounded-lg shadow-sm border border-gray-100">
              <div class="flex justify-between items-center mb-2">
                <div class="flex items-center gap-2">
                  <span class="font-bold text-lg">${icon}</span>
                  <span class="font-bold text-gray-800">${s.name}</span>
                </div>
                <span class="font-bold text-blue-600">${pct}%</span>
              </div>
              <div class="w-full bg-gray-200 rounded-full h-2.5">
                <div class="bg-blue-500 h-2.5 rounded-full" style="width: ${pct}%"></div>
              </div>
            </div>`;
        }).join('');

        let sortedTests = Array.from(tests).sort();
        let html = `<table class="w-full text-sm"><thead><tr class="bg-blue-900 text-white">
          <th class="p-3 text-left whitespace-nowrap">Student</th>` + 
          sortedTests.map(t => `<th class="p-3 border-l border-blue-800 whitespace-nowrap">${t.replace(/_/g,' ')} ${isAdmin ? `<button onclick="window.deleteTest('${t}')" class="text-red-300 ml-2 hover:text-white">×</button>`:''}</th>`).join('') +
          `</tr></thead><tbody>`;

        students.sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
          html += `<tr class="border-b"><td class="p-3 font-medium">${isAdmin ? `<button onclick="window.deleteStudent('${s.id}')" class="text-red-500 mr-2 font-bold">×</button>`:''}${s.name}</td>` +
            sortedTests.map(t => `<td class="p-3 text-center border-l">
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" class="sr-only peer" ${s[t] ? 'checked' : ''} onchange="window.updateToggle('${s.id}', '${t}', this.checked)">
                <div class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:bg-green-500 peer-checked:shadow-[0_0_10px_rgba(34,197,94,0.7)] after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
              </label>
            </td>`).join('') + `</tr>`;
        });
        dashboard.innerHTML = html + `</tbody></table>`;
      } catch(e) { console.error(e); }
    }

    window.updateToggle = async (id, field, val) => { await updateDoc(doc(db, 'students', id), {[field]: val}); renderTable(); };
    window.deleteStudent = async (id) => { if(confirm('Delete student?')) await deleteDoc(doc(db, 'students', id)); renderTable(); };
    
    // FIXED DELETE TEST FUNCTION
    window.deleteTest = async (test) => {
      if(!confirm('Delete this test column for everyone?')) return;
      const snaps = await getDocs(collection(db, "students"));
      const updates = snaps.docs.map(d => updateDoc(d.ref, { [test]: deleteField() }));
      await Promise.all(updates);
      renderTable();
    };

    document.getElementById('addStudentBtn').onclick = async () => {
      const name = document.getElementById('newStudentName').value.trim();
      if(!name) return;
      let data = { name };
      document.querySelectorAll('th').forEach(th => {
        if(th.innerText.includes('×')) data[th.innerText.replace(' ×', '').replace(/ /g, '_')] = false;
      });
      await addDoc(collection(db, "students"), data);
      document.getElementById('newStudentName').value = '';
      renderTable();
    };

    document.getElementById('addTestBtn').onclick = async () => {
      const name = document.getElementById('newTestName').value.trim();
      if(!name) return;
      const field = name.replace(/[\/ ]/g, '_').toUpperCase();
      const snaps = await getDocs(collection(db, "students"));
      const updates = snaps.docs.map(d => updateDoc(d.ref, {[field]: false}));
      await Promise.all(updates);
      document.getElementById('newTestName').value = '';
      renderTable();
    };

    renderTable();
  </script>
</body>
</html>
